<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareerGenie AI - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:#f4f7fb;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login-wrapper{
  width:100%;
  max-width:500px;
  background:#ffffff;
  border:1px solid #dbe3ef;
  border-radius:20px;
  padding:35px;
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
  background:#eaf1fb;
  padding:10px 15px;
  border-radius:50px;
  font-weight:700;
  color:#1f569d;
  width:fit-content;
  margin-bottom:20px;
}

.brand-circle{
  width:14px;
  height:14px;
  border:3px solid #1f569d;
  border-radius:50%;
}

h1{
  font-size:32px;
  margin-bottom:8px;
}

.subtitle{
  font-size:14px;
  color:#6d7b8f;
  margin-bottom:25px;
}

.field{
  margin-bottom:15px;
}

.field label{
  display:block;
  font-size:14px;
  font-weight:600;
  margin-bottom:5px;
}

.field input{
  width:100%;
  height:45px;
  border:1px solid #dbe3ef;
  border-radius:10px;
  padding:0 12px;
  font-size:14px;
  outline:none;
}

.options{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:10px 0 20px;
  font-size:13px;
}

.options input{
  accent-color:#20579f;
}

.forgot{
  color:#20579f;
  text-decoration:none;
  font-weight:600;
}

.btn{
  width:100%;
  height:45px;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
  margin-bottom:10px;
}

.btn-login{
  background:#20579f;
  color:white;
}

.btn-login:hover{
  background:#184987;
}

.signup{
  text-align:center;
  font-size:13px;
  color:#6d7b8f;
}

.signup a{
  color:#20579f;
  font-weight:600;
  text-decoration:none;
}

</style>
</head>

<body>


<div class="login-wrapper">

  <div class="brand">
    <div class="brand-circle"></div>
    CareerGenie AI
  </div>

  <h1>Login</h1>
  <p class="subtitle">Enter your details to continue your career journey.</p>

  <form action="/login_user" method="POST">
    {% if error %}
<p style="color:red; font-size:14px; margin-bottom:15px;">
  {{ error }}
</p>
{% endif %}
    
    <div class="field">
      <label>Email Address</label>
      <input type="email" name="email" placeholder="Enter your email" required>
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter your password" required>
    </div>

    <div class="options">
      <label><input type="checkbox"> Remember me</label>
      <a href="#" class="forgot">Forgot password?</a>
    </div>

    <button class="btn btn-login" type="submit">Login</button>
  </form>

  <div class="signup">
    Don’t have an account? <a href="/signup.html">Sign up</a>
  </div>

</div>

</body>
</html>
